<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Event Portal</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f7fb; color: #222; }
    header { background: #0077cc; color: white; padding: 1rem; text-align: center; }
    main { max-width: 1024px; margin: 1rem auto; padding: 0 1rem; }
    .controls { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
    .controls label { display: flex; flex-direction: column; font-size: 0.9rem; }
    #eventsContainer { display: grid; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); gap: 1rem; }
    .event-card { background: white; border-radius: 10px; padding: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .event-card h3 { margin-top: 0; }
    .event-card p { margin: 0.3rem 0; }
    .badge { display: inline-block; margin: 0.2rem 0; padding: 0.25rem 0.5rem; border-radius: 5px; background: #eef5ff; color: #005aaa; font-size: 0.8rem; }
    form { background: white; padding: 1rem; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-top: 1rem; }
    form div { margin-bottom: 0.75rem; }
    form input, form select { width: 100%; padding: 0.6rem; border-radius: 6px; border: 1px solid #ccc; }
    .message { margin: 0.5rem 0; font-size: 0.95rem; }
    .error { color: #c33; }
    .success { color: #096; }
    #loadingSpinner { display: none; text-align: center; margin: 1rem 0; }
    #frameworkHint { margin-top: 1rem; font-size: 0.95rem; color: #555; }
  </style>
</head>
<body>
  <header>
    <h1>Local Community Event Portal</h1>
    <p>Find local events, register, and filter by category or location.</p>
  </header>
  <main>
    <section class="controls">
      <label>
        Filter by category
        <select id="categoryFilter">
          <option value="all">All</option>
          <option value="Music">Music</option>
          <option value="Workshop">Workshop</option>
          <option value="Sports">Sports</option>
          <option value="Community">Community</option>
        </select>
      </label>
      <label>
        Search by name
        <input id="searchInput" type="text" placeholder="Type event name and press Enter" />
      </label>
    </section>

    <div id="loadingSpinner">Loading events...</div>
    <div id="eventsContainer"></div>

    <form id="registrationForm">
      <h2>Register for an Event</h2>
      <div>
        <label>Name <input name="name" type="text" placeholder="Your full name" /></label>
      </div>
      <div>
        <label>Email <input name="email" type="email" placeholder="you@example.com" /></label>
      </div>
      <div>
        <label>Event <select name="eventId"></select></label>
      </div>
      <button id="registerBtn" type="submit">Register</button>
      <div class="message" id="formMessage"></div>
    </form>

    <p id="frameworkHint">One benefit of using frameworks like React or Vue is that they help manage UI state and complex event-driven updates more cleanly than direct DOM manipulation.</p>
  </main>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
