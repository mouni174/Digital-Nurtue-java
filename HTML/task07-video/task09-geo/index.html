<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Task 09 — Geolocation</title></head>
<body>
  <h1>Geolocation</h1>
  <button id="find">Find Nearby Events</button>
  <div id="out"></div>
  <script>
    document.getElementById('find').addEventListener('click',()=>{
      const out=document.getElementById('out'); out.textContent='Requesting...';
      if(!navigator.geolocation){ out.textContent='Not supported'; return; }
      navigator.geolocation.getCurrentPosition(pos=>{ out.textContent=`Lat:${pos.coords.latitude.toFixed(5)} Lon:${pos.coords.longitude.toFixed(5)}` }, err=>{
        if(err.code===1) out.textContent='Permission denied'; else if(err.code===3) out.textContent='Timeout'; else out.textContent=err.message;
      }, { enableHighAccuracy:true, timeout:10000 });
    });
  </script>
</body>
</html>
