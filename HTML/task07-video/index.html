<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Task 07 — Video Invite</title>
</head>
<body>
  <h1>Video Invite</h1>
  <video id="v" controls oncanplay="onReady()" width="480">
    <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
  </video>
  <div id="msg"></div>

  <form id="f">
    <input id="t" placeholder="Type something">
  </form>

  <script>
    let dirty=false; document.getElementById('f').addEventListener('input',()=>dirty=true);
    function onReady(){ document.getElementById('msg').textContent='Video ready to play'; }
    window.addEventListener('beforeunload', function(e){ if(dirty){ e.returnValue='You have unsaved changes'; } });
  </script>
</body>
</html>
