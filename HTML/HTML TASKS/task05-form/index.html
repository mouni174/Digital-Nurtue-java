<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Task 05 — Event Registration Form</title>
  <style>form{max-width:520px;background:#f2f2f2;padding:12px;border-radius:6px} label{display:block;margin-top:8px}</style>
</head>
<body>
  <h1>Register</h1>
  <form id="form">
    <label>Name<input type="text" id="name" required placeholder="Full name" autofocus></label>
    <label>Email<input type="email" id="email" required placeholder="you@example.com"></label>
    <label>Date<input type="date" id="date" required></label>
    <label>Type<select id="type"><option>Picnic</option><option>Concert</option></select></label>
    <label>Message<textarea id="msg"></textarea></label>
    <button type="submit">Submit</button>
    <output id="out"></output>
  </form>
  <script>
    document.getElementById('form').addEventListener('submit', function(e){
      e.preventDefault();
      const name = document.getElementById('name').value || 'Guest';
      document.getElementById('out').textContent = `Thanks ${name}, registration received.`;
    });
  </script>
</body>
</html>
